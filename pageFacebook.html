<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>page fb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/pageFacebook.css">
</head>

<body>
  <nav class="h50px bg-fb1">
    <div class="container h-100 d-flex align-items-center placeholder-glow">
      <i class="fa-brands fa-square-facebook fs-2 text-light me-2"></i>

      <div id="search-bar" class="input-group input-group-sm w200px me-auto">
        <span class="input-group-text">搜尋</span>
        <input type="text" class="form-control border border-start-0 border-end-0 focus-ring"
          style="--bs-focus-ring-color: rgba(var(--bs-success-rgb), 0)" aria-label="Amount (to the nearest dollar)">
        <span class="input-group-text">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
      </div>

      <div class="img-head w30px h30px bg-fb5 rounded-circle placeholder me-5"></div>
      <div class="text-light px-4 ms-5">首頁</div>
      <div class="text-light px-4">建立</div>
      <i class="fa-solid fa-user-group fs-4 text-fb8 me-3"></i>
      <i class="fa-solid fa-comment fs-4 text-fb8 me-3"></i>
      <i class="fa-solid fa-bell fs-4 text-fb8 me-3"></i>
      <i class="fa-solid fa-circle-question fs-4 text-fb8 me-3"></i>
      <i class="fa-sharp fa-solid fa-sort-down text-fb8 mb-2"></i>
    </div>
  </nav>


  <main>
    <div class="container placeholder-glow">
      <div class="row g-2">
        <div class="col-2 py-3">
          <div class="hstack gap-2 mb-3">
            <div class="img-head w30px h30px bg-fb5 rounded-circle placeholder"></div>
            <span class="placeholder col-7"></span>
          </div>

          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-5"></span>
            <i class="fa-solid fa-ellipsis ms-auto"></i>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-4"></span>
            <div class="h10px w10px bg-danger rounded-circle ms-auto me-1"></div>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-7"></span>
            <div class="h10px w10px bg-danger rounded-circle ms-auto me-1"></div>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-3"></span>
          </div>
          <div class="hstack gap-2 mb-3">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-4"></span>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-5"></span>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-6"></span>
          </div>
          <div class="hstack gap-2 mb-3">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-7"></span>
          </div>

          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-5"></span>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-6"></span>
          </div>
          <div class="hstack gap-2 mb-1">
            <div class="img-head w30px h30px bg-fb5 rounded-2 placeholder"></div>
            <span class="placeholder col-7"></span>
          </div>

        </div>
        <div class="col">
          <div class="card">
            <div class="card-header">1</div>
            <div class="card-body">2</div>
            <div class="card-footer">3</div>
          </div>
        </div>
        <div class="col-3">3</div>
      </div>
    </div>
  </main>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script>
    document.querySelector("#search-bar").addEventListener("focusin", (event) => {
      event.target.parentElement.classList.add("active");
    });
    document.querySelector("#search-bar").addEventListener("focusout", (event) => {
      event.target.parentElement.classList.remove("active");
    });
  </script>
</body>

</html>
